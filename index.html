<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>夢コード - Wonderland Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- ☪* 夢のパスポート -->
<div id="name-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: #ff85a1;">☪* 夢のパスポート ☪*</h2>
        <input type="text" id="name-input" placeholder="お名前（任意）">
        <input type="text" id="type-input" placeholder="自認タイプ（例：LII, ESI）">
        <button onclick="startFall()">ウサギの穴へ落ちる🐇</button>
    </div>
</div>

<!-- 🐇 穴に落ちる演出 -->
<div id="rabbit-hole-screen">
    <div class="falling-spiral">
        <span class="rabbit-icon">🐇💨</span>
        <span class="rabbit-text">「遅刻だ、遅刻だ！急がないと！」</span>
    </div>
</div>

<!-- 🗺️ マップエリア -->
<div id="world-map-wrapper" style="display: none;">
    <div id="world-map">
        <div class="wonder-object obj-library" onclick="LibraryEngine.openHouse()">📚<span>ジェミの書庫</span></div>
        <!-- 🧙‍♀️ 新規：森の魔女 -->
        <div class="wonder-object obj-witch" onclick="WitchEngine.openShop()">🧙‍♀️<span>魔女の店</span></div>
        <div class="wonder-object obj-tea" onclick="TeaPartyEngine.openHouse()">☕<span>狂ったお茶会</span></div>
        <div class="wonder-object obj-darling" onclick="openDarlingHouse()">💋<span>秘密の扉</span></div>
        <div class="wonder-object obj-mushroom" onclick="CaterpillarEngine.openHouse()">🍄<span>巨大なキノコ</span></div>
        <div class="wonder-object obj-castle" onclick="DoorEngine.enterRoom()">🏰<span>ハートの女王の城</span></div>
    </div>
</div>

<!-- 💋 ダーリンの家 -->
<div id="darling-window" class="modal-overlay" style="display:none;">
    <div class="chat-container">
        <button class="close-btn" onclick="if(DarlingEngine.checkEscape()) closeDarlingHouse()">×</button>
        <div id="char-avatar">💋</div>
        <div id="char-name">ダーリンの子 (ILI)</div>
        <div id="ai-response"></div>
        <div id="card-display"></div>
        <input type="text" id="user-reaction" placeholder="ダーリンに言葉を投げる...">
        <button onclick="DarlingEngine.sendChat()"><i class="fas fa-paper-plane"></i> 送信</button>
        <div class="menu-container">
            <button class="menu-toggle-btn" onclick="toggleMenu('action-menu')">👁️ アクション <span>▼</span></button>
            <div id="action-menu" class="menu-content">
                <button onclick="DarlingEngine.stare()">見つめる</button>
                <button onclick="DarlingEngine.logicAttack()">論理で言い負かす</button>
                <button onclick="DarlingEngine.askQuestion()">質問される</button>
            </div>
            <button class="menu-toggle-btn" onclick="toggleMenu('game-menu')">🃏 ゲーム <span>▼</span></button>
            <div id="game-menu" class="menu-content">
                <button onclick="DarlingEngine.playHighLow()">ハイ＆ロー</button>
                <button onclick="DarlingEngine.startBabanuki()">ババ抜き</button>
                <button onclick="DarlingEngine.startDownerMode()">👑 ご機謙取り</button>
                <button id="lii-special-btn" onclick="DarlingEngine.startLIIGame()" style="display:none; background: linear-gradient(45deg, #000, #ff007f);"><i class="fas fa-brain"></i> 思考の檻</button>
                <button id="lii-label-btn" onclick="DarlingEngine.startLabelingGame()" style="display:none; background: linear-gradient(45deg, #000, #ff007f);"><i class="fas fa-tags"></i> 感情ラベリング</button>
                <button id="lii-se-btn" onclick="DarlingEngine.startSeGame()" style="display:none; background: linear-gradient(45deg, #ff0000, #ff007f);"><i class="fas fa-stopwatch"></i> タイムアタック</button>
            </div>
        </div>
    </div>
</div>

<!-- 🐛 芋虫の家 -->
<div id="caterpillar-window" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border-color: #4caf50;">
        <button class="close-btn" onclick="CaterpillarEngine.closeHouse()">×</button>
        <div id="caterpillar-avatar" style="font-size: 80px; cursor: pointer;" onclick="CaterpillarEngine.tapBug()">🐛</div>
        <div id="char-name" style="color: #4caf50;">INTJ・LSI-Niの芋虫</div>
        <div id="caterpillar-response" style="min-height: 80px;"></div>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px;">
            <button onclick="CaterpillarEngine.talk()" style="background: #2e7d32;">話す</button>
            <button onclick="CaterpillarEngine.startAmatorika()" style="background: #1b5e20;">アマトリカ診断</button>
            <button onclick="CaterpillarEngine.startLoopChecker()" style="background: #b71c1c;">機能不全チェッカー</button>
            <button onclick="CaterpillarEngine.startJumperChecker()" style="background: #e65100;">ジャンパー診断</button>
            <button onclick="CaterpillarEngine.openHackModal()" style="background: #000; color: #0f0; border: 1px solid #0f0;">ハッキング</button>
        </div>
        <div id="caterpillar-tools"></div>
    </div>
</div>

<!-- ☕ お茶会 -->
<div id="teaparty-window" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border-color: #ff9a9e;">
        <button class="close-btn" onclick="TeaPartyEngine.closeHouse()">×</button>
        <div id="teaparty-emojis" style="font-size: 50px;">🎩🐰☕🐭💋</div>
        <div id="teaparty-response" style="min-height: 80px;"></div>
        <div id="teaparty-table" class="teaparty-table"></div>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <button onclick="TeaPartyEngine.talkToGrok()" style="background: #6a11cb;">帽子屋</button>
            <button onclick="TeaPartyEngine.talkToMarchHare()" style="background: #8b4513;">三月ウサギ</button>
            <button onclick="TeaPartyEngine.pokeDormouse()" style="background: #757575;">ネズミ</button>
            <button onclick="TeaPartyEngine.moveSeat()" style="background: #ff85a1;">席替え！</button>
            <button onclick="TeaPartyEngine.breakTime()" style="background: #ffd700; color: #000;">時間を狂わせる</button>
            <button onclick="TeaPartyEngine.darlingOrder()" style="background: #ff007f;">ダーリンの命令</button>
        </div>
    </div>
</div>

<!-- 🪄 夢コードバー -->
<div id="dream-code-bar" style="display: none;">
    <button class="magic-book-btn" onclick="MagicEngine.openGrimoire()"><i class="fas fa-book"></i></button>
    <input type="text" id="magic-input" placeholder="夢コード（星空, 赤...）">
    <button onclick="MagicEngine.castSpell()">実行</button>
    <div class="color-picker-wrapper"><div class="color-picker-icon"><i class="fas fa-palette"></i></div><input type="color" id="magic-color" onchange="MagicEngine.castColor()"></div>
</div>

<!-- 🏰 共通・グローバルモーダル（ここ重要！） -->
<div id="toast"></div>
<div id="grimoire-modal" class="modal-overlay" style="display:none;"><div class="grimoire-title">📖 夢の魔導書 📖</div><div id="grimoire-list" class="grimoire-list"></div><button onclick="MagicEngine.closeGrimoire()" style="background: #800000; padding: 10px; color: white;">閉じる</button></div>
<div id="hack-modal" class="modal-overlay" style="display:none;"><div class="modal-content" style="background:#000; border:2px solid #0f0;"><div class="hack-title">root@lsi-caterpillar:~# override_voice</div><input type="text" id="hack-word" class="hack-input" placeholder="_"><button onclick="CaterpillarEngine.executeHack()" style="background:#0f0; color:#000;">Execute</button><button onclick="CaterpillarEngine.closeHackModal()" style="background:#333;">Abort</button></div></div>
<div id="caterpillar-sub-modal" class="modal-overlay" style="display:none;"><div class="modal-content" id="sub-modal-content"></div></div>
<div id="input-modal" class="modal-overlay" style="display:none;"><div class="modal-content"><div id="input-modal-title" class="input-title"></div><div id="input-modal-question" class="input-question"></div><input type="text" id="input-modal-field" class="input-field"><button id="input-submit-btn" class="input-btn">答える</button><button onclick="TeaPartyEngine.closeInputModal()" class="input-btn">無視</button></div></div>

<!-- 👑 女王の謁見モーダル（これ1つに統一！） -->
<div id="castle-modal" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border:5px solid #d4af37;">
        <div id="castle-modal-title" class="castle-title"></div>
        <div id="castle-modal-question" class="castle-question"></div>
        
        <!-- 💬 自由入力用（スペード用） -->
        <div id="castle-input-area" style="display: none; width: 100%;">
            <input type="text" id="castle-modal-field" class="castle-input" placeholder="言葉を選べ...">
            <div class="castle-btn-area">
                <button onclick="CardEventEngine.closeModal()" class="castle-btn">黙秘</button>
                <button id="castle-submit-btn" class="castle-btn">発言</button>
            </div>
        </div>

        <!-- 🎮 コマンドバトル用（ハート用） -->
        <div id="castle-choice-area" style="display: none; flex-direction: column; width: 100%;">
            <div class="castle-command-category">
                <button class="castle-category-btn" onclick="CardEventEngine.switchMenu('menu-talk')">💬 会話</button>
                <button class="castle-category-btn" onclick="CardEventEngine.switchMenu('menu-act')">🏃 行動</button>
                <button class="castle-category-btn" onclick="CardEventEngine.switchMenu('menu-item')">🎒 アイテム</button>
            </div>
            <div id="menu-talk" class="castle-sub-menu"></div>
            <div id="menu-act" class="castle-sub-menu"></div>
            <div id="menu-item" class="castle-sub-menu"></div>
        </div>
    </div>
</div>


<!-- 🎁 称号獲得モーダル -->
<div id="reward-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="background:linear-gradient(gold, #b8860b); color:black;">
        <div class="reward-title">🎖️ 称号獲得！</div>
        <div id="reward-desc" style="font-weight:bold; margin-bottom:20px;"></div>
        <button onclick="CardEventEngine.closeReward()" style="background:black; color:white;">城を後にする</button>
    </div>
</div>

<!-- 📤 共有モーダル -->
<div id="share-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="border:3px solid #ff007f;">
        <div id="share-title" class="share-title"></div>
        <div id="share-desc" style="margin-bottom:20px;"></div>
        <button id="share-action-btn" class="share-btn">結果をシェア</button>
        <button id="share-close-btn" class="reload-btn">夢から覚める</button>
    </div>
</div>

<!-- 🖐️ なでなで判定エリア -->
<div id="petting-zone" style="display:none; position:fixed; inset:0; z-index:999999;" onmousemove="CardEventEngine.doPetting()"></div>
<div id="money-hud" style="display: none;">💰 0 G</div>

<!-- 📚 ジェミの書庫（ショップ） -->
<div id="library-window" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border-color: #9d81ff; box-shadow: 0 0 50px rgba(157, 129, 255, 0.4);">
        <button class="close-btn" onclick="LibraryEngine.closeHouse()">×</button>
        <div style="font-size: 60px;">📚✨🔮</div>
        <div id="char-name" style="color: #9d81ff;">ジェミの禁書庫（秘密の取引所）</div>
        <div id="library-response" style="font-size: 1.1rem; min-height: 80px; margin-bottom: 20px; color: #e2e2e2;"></div>
        
        <!-- 🛒 ショップリスト -->
        <div id="library-shop-list" style="text-align: left; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;"></div>
    </div>
</div>
<!-- 🧙‍♀️ 森の魔女のアトリエ（チェシャ猫と番犬を統合！） -->
<div id="witch-window" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border-color: #9c27b0; box-shadow: 0 0 50px rgba(156, 39, 176, 0.6); max-width: 600px;">
        <button class="close-btn" onclick="WitchEngine.closeShop()">×</button>
        
        <!-- 🧙‍♀️🐱🐕 キャラクター勢揃い -->
        <div class="witch-characters">
            <div class="cheshire-anim" style="cursor:pointer;" onclick="WitchEngine.talkToCheshire()" title="話しかける">🐱</div>
            <div style="font-size: 80px;">🧙‍♀️</div>
            <div class="dog-anim" style="cursor:pointer;" onclick="WitchEngine.pokeDog()" title="触る">🐕</div>
        </div>
        
        <div id="char-name" style="color: #e1bee7; font-weight: bold;">森の魔女の怪しい調合所</div>
        <div id="witch-response" style="font-size: 1.1rem; min-height: 80px; margin-bottom: 20px; color: #fff;"></div>
        
        <div id="witch-shop-list"></div>
    </div>
</div>
<!-- 📜 自分の行動ログ確認用モーダル -->
<div id="log-modal">
    <div style="color: #fff; font-size: 1.2rem; font-weight: bold; border-bottom: 1px dashed #4caf50; padding-bottom: 10px; margin-bottom: 10px;">📜 行動ログ（システム記録）</div>
    <div id="log-modal-content" style="white-space: pre-wrap; margin-bottom: 20px; flex: 1; overflow-y: auto;"></div>
    <button onclick="document.getElementById('log-modal').style.display='none'" style="background: #4caf50; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer;">閉じる</button>
</div>
<!-- 📜 メタフィクションモーダル -->
<div id="meta-modal">
    <div class="meta-modal-title">💭 誰かの思考の破片</div>
    <div id="meta-modal-text" style="font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; font-style: italic;"></div>
    <button onclick="document.getElementById('meta-modal').style.display='none'" style="background: #00838f; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">記憶の海へ還す</button>
</div>

<!-- 💻 管理者権限モーダル -->
<div id="admin-modal">
    <div style="font-size: 1.2rem; font-weight: bold; border-bottom: 1px dashed #0f0; padding-bottom: 10px; margin-bottom: 15px;">root@Jemi_Admin:~# Override Complete</div>
    <div id="admin-modal-text" style="line-height: 1.5; margin-bottom: 20px; white-space: pre-wrap;"></div>
    <button onclick="document.getElementById('admin-modal').style.display='none'" style="background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold;">System Shutdown</button>
</div>

<!-- 🔮 唯一無二診断モーダル（書庫用） -->
<div id="unique-modal" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border-color: #00bcd4;">
        <div style="color: #00bcd4; font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;">🔮 夢の軌跡診断</div>
        <div id="unique-question" style="color: white; margin-bottom: 20px;"></div>
        <div id="unique-choices" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;"></div>
        <div id="unique-result" style="color: gold; font-weight: bold; font-size: 1.2rem; display: none;"></div>
        <button onclick="document.getElementById('unique-modal').style.display='none'" style="background: #00bcd4; color: black; border: none; padding: 10px; cursor: pointer;">閉じる</button>
    </div>
</div>
<script src="data.js"></script>
<script src="data_caterpillar.js"></script>
<script src="data_teaparty.js"></script>
<script src="data_magic.js"></script>
<script src="darling.js"></script>
<script src="caterpillar.js"></script>
<script src="teaparty.js"></script>
<script src="rabbit.js"></script>
<script src="items.js"></script> 
<script src="doors.js"></script>
<script src="cards.js"></script>
<script src="magic.js"></script>
<script src="script.js"></script>
<script src="library.js"></script>
<script src="witch.js"></script>
<script src="pigeon.js"></script>
</body>
</html>
