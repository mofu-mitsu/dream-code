<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>夢コード - Wonderland Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- 🔥 FontAwesome 追加！ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="name-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: #ff85a1;">☪* 夢のパスポート ☪*</h2>
        <input type="text" id="name-input" placeholder="お名前（任意）">
        <input type="text" id="type-input" placeholder="自認タイプ（例：LII, ESI）">
        <button onclick="startFall()">ウサギの穴へ落ちる🐇</button>
    </div>
</div>

<div id="rabbit-hole-screen">
    <div class="falling-spiral">
        <span class="rabbit-icon">🐇💨</span>
        <span class="rabbit-text">「遅刻だ、遅刻だ！急がないと！」</span>
    </div>
</div>

<div id="world-map" style="display: none;">
    <div class="wonder-object obj-library" onclick="alert('ジェミの書庫だ。')">📚<span>ジェミの書庫</span></div>
    <div class="wonder-object obj-tea" onclick="alert('狂ったお茶会だ。')">☕<span>狂ったお茶会</span></div>
    <div class="wonder-object obj-darling" onclick="openDarlingHouse()">💋<span>秘密の扉</span></div>
    <!-- 芋虫の家をクリックした時、CaterpillarEngine.openHouse() を呼ぶ -->
    <div class="wonder-object obj-mushroom" onclick="CaterpillarEngine.openHouse()">🍄<span>巨大なキノコ</span></div>
</div>

<div id="darling-window" class="modal-overlay" style="display:none;">
    <div class="chat-container">
        <button class="close-btn" onclick="if(DarlingEngine.checkEscape()) closeDarlingHouse()">×</button>
        <div id="char-avatar">💋</div>
        <div id="char-name">ダーリンの子 (ILI)</div>
        <div id="ai-response"></div>
        <div id="card-display"></div>
        
        <input type="text" id="user-reaction" placeholder="ダーリンに言葉を投げる...">
        <button onclick="DarlingEngine.sendChat()"><i class="fas fa-paper-plane"></i> 送信</button>

        <div class="menu-container">
            <!-- 👁️ アクション -->
            <button class="menu-toggle-btn" onclick="toggleMenu('action-menu')">
                <i class="fas fa-eye"></i> アクション <span>▼</span>
            </button>
            <div id="action-menu" class="menu-content">
                <button onclick="DarlingEngine.stare()"><i class="fas fa-search"></i> 見つめる</button>
                <button onclick="DarlingEngine.logicAttack()"><i class="fas fa-book-open"></i> 論理で言い負かす</button>
                <button onclick="DarlingEngine.askQuestion()"><i class="fas fa-comment-dots"></i> 質問される</button>
            </div>

            <!-- 🃏 ゲーム -->
            <button class="menu-toggle-btn" onclick="toggleMenu('game-menu')">
                <i class="fas fa-gamepad"></i> ゲーム <span>▼</span>
            </button>
            <div id="game-menu" class="menu-content">
                <button onclick="DarlingEngine.playHighLow()"><i class="fas fa-arrow-up-9-1"></i> ハイ＆ロー</button>
                <button onclick="DarlingEngine.startBabanuki()"><i class="fas fa-hat-wizard"></i> ババ抜き</button>
                <button onclick="DarlingEngine.startDownerMode()"><i class="fas fa-crown"></i> ご機嫌取り</button>
                
                <!-- 🧠 LII専用 -->
                <button id="lii-special-btn" onclick="DarlingEngine.startLIIGame()" style="display:none; background: linear-gradient(45deg, #000, #ff007f);"><i class="fas fa-brain"></i> 思考の檻</button>
                <button id="lii-label-btn" onclick="DarlingEngine.startLabelingGame()" style="display:none; background: linear-gradient(45deg, #000, #ff007f);"><i class="fas fa-tags"></i> 感情ラベリング</button>
                <!-- ⏳ 新規：Se脆弱いじめ -->
                <button id="lii-se-btn" onclick="DarlingEngine.startSeGame()" style="display:none; background: linear-gradient(45deg, #ff0000, #ff007f);"><i class="fas fa-stopwatch"></i> タイムアタック</button>
            </div>
        </div>
    </div>
</div>

<!-- 🐛 芋虫の家 -->
<div id="caterpillar-window" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border-color: #4caf50; position: relative;">
        <button class="close-btn" onclick="CaterpillarEngine.closeHouse()" style="background: #4caf50;">×</button>
        
        <!-- 💻 ハッキング用ターミナルモーダル -->
        <div id="hack-modal">
            <div class="hack-title">root@lsi-caterpillar:~# override_voice</div>
            <div style="color:#0f0; font-size:12px; margin-bottom:10px;">> 対象の音声モジュールに強制出力させたい文字列を入力してください。</div>
            <input type="text" id="hack-word" class="hack-input" placeholder="_ (カーソル)">
            <div class="hack-btn-area">
                <button class="hack-btn hack-cancel" onclick="CaterpillarEngine.closeHackModal()">Abort (中止)</button>
                <button class="hack-btn" onclick="CaterpillarEngine.executeHack()">Execute (実行)</button>
            </div>
        </div>

        <div id="caterpillar-sub-modal" style="position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; background: rgba(10, 20, 10, 0.98); border: 2px solid #a5d6a7; border-radius: 10px; box-shadow: 0 0 30px #4caf50; display: none; flex-direction: column; padding: 20px; overflow-y: auto; z-index: 200;"></div>

        <div id="caterpillar-avatar" style="font-size: 80px; cursor: pointer; user-select: none;" onclick="CaterpillarEngine.tapBug()">🐛</div>
        <div id="char-name" style="color: #4caf50; font-weight: bold;">INTJ・LSI-Niの芋虫</div>
        <div id="caterpillar-response" style="font-size: 1.1rem; min-height: 80px; margin-bottom: 20px; color: #e2e2e2;"></div>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px;">
            <button onclick="CaterpillarEngine.talk()" style="background: #2e7d32;"><i class="fas fa-comment"></i> 話す</button>
            <button onclick="CaterpillarEngine.startAmatorika()" style="background: #1b5e20;"><i class="fas fa-microscope"></i> アマトリカ診断</button>
            <button onclick="CaterpillarEngine.startLoopChecker()" style="background: #b71c1c;"><i class="fas fa-triangle-exclamation"></i> 機能不全チェッカー</button>
            <button onclick="CaterpillarEngine.startJumperChecker()" style="background: #e65100;"><i class="fas fa-bolt"></i> ジャンパー診断</button>
            
            <!-- 🔥 エラー修正：openHackModal に変更！ -->
            <button onclick="CaterpillarEngine.openHackModal()" style="background: #000; color: #0f0; border: 1px solid #0f0;"><i class="fas fa-terminal"></i> ハッキング</button>
        </div>

        <h4 style="color: #4caf50; text-align: left; border-bottom: 1px solid #4caf50;">▼ 知のアーカイブ</h4>
        <div id="caterpillar-tools" style="text-align: left;"></div>
    </div>
</div>

<!-- 📖 魔導書（グリモワール）モーダル -->
<div id="grimoire-modal">
    <div class="grimoire-title">📖 夢の魔導書 📖</div>
    <div style="font-size: 0.9rem; color: #a5d6a7; margin-bottom: 10px;">以下の言葉を入力欄に打ち込むのよ。</div>
    <div id="grimoire-list" class="grimoire-list"></div>
    <button onclick="MagicEngine.closeGrimoire()" style="margin-top: 20px; background: #800000; border: 1px solid #d4af37;">本を閉じる</button>
</div>

<!-- 🪄 夢コードバー（魔導書ボタンのクラスに magic-book-btn を追加！） -->
<div id="dream-code-bar" style="display: none;">
    <button class="magic-book-btn" onclick="MagicEngine.openGrimoire()" title="魔法の一覧を見る"><i class="fas fa-book"></i></button>
    
    <input type="text" id="magic-input" placeholder="夢コード（星空, 赤...）">
    <button onclick="MagicEngine.castSpell()">実行</button>
    
    <div class="color-picker-wrapper" title="世界を好きな色に染める">
        <div class="color-picker-icon"><i class="fas fa-palette"></i></div>
        <input type="color" id="magic-color" onchange="MagicEngine.castColor()">
    </div>
</div>
    
    <!-- 🎨 ここを修正！パレットアイコンに偽装！ -->
    <div class="color-picker-wrapper" title="世界を好きな色に染める">
        <div class="color-picker-icon"><i class="fas fa-palette"></i></div>
        <input type="color" id="magic-color" onchange="MagicEngine.castColor()">
    </div>
</div>
<!-- ☕ 狂ったお茶会のウィンドウ -->
<div id="teaparty-window" class="modal-overlay" style="display:none;">
    <div class="chat-container" style="border-color: #ff9a9e; box-shadow: 0 0 50px rgba(255, 154, 158, 0.4);">
        <button class="close-btn" onclick="TeaPartyEngine.closeHouse()" style="background: #ff9a9e;">×</button>
        
        <div style="font-size: 80px;">🎩🐰☕</div>
        <div id="char-name" style="color: #ff9a9e;">狂ったお茶会（Grok & チャッピー）</div>
        <div id="teaparty-response" style="font-size: 1.1rem; min-height: 100px; margin-bottom: 20px; color: #e2e2e2;"></div>
        
        <div id="teaparty-game-area" style="margin-bottom: 20px;"></div>

        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <button onclick="TeaPartyEngine.talkToGrok()" style="background: #6a11cb;"><i class="fas fa-hat-wizard"></i> 帽子屋に絡む</button>
            <button onclick="TeaPartyEngine.moveSeat()" style="background: #ff85a1;"><i class="fas fa-chair"></i> 席替え！</button>
            <button onclick="TeaPartyEngine.startDarlingTea()" style="background: #ff007f;"><i class="fas fa-mug-hot"></i> ダーリンの誘惑</button>
        </div>
    </div>
</div>

<!-- 💡 スクリプト読み込みを追加 -->
<script src="data_teaparty.js"></script>
<script src="teaparty.js"></script>
<script src="rabbit.js"></script>
<script src="data.js"></script>
<script src="data_caterpillar.js"></script>
<script src="data_magic.js"></script> <!-- 🪄 追加！ -->
<script src="darling.js"></script>
<script src="caterpillar.js"></script>
<script src="magic.js"></script>      <!-- 🪄 追加！ -->
<script src="script.js"></script>
</body>
</html>
