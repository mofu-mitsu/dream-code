<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>夢コード v5.0 - Wonderland Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="dream-world" class="theme-wonderland">

    <!-- 名前入力モーダル -->
    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="title-cute">☪* 夢のパスポート ☪*</h2>
            <input type="text" id="name-input" placeholder="お名前を教えて？">
            <button onclick="startDream()">不思議の国へ</button>
        </div>
    </div>

    <!-- 🏰 不思議の国マップエリア -->
    <div id="world-map" style="display: none;">
        <div class="map-header">
            <div class="magic-bar">
                <input type="text" id="magic-input" placeholder="魔法のコード（芋虫、カラオケ...）">
                <button onclick="castMagic()">魔法をかける</button>
            </div>
        </div>

        <div class="houses-container">
            <div class="house" onclick="alert('ここはジェミの本棚。まだ鍵がかかってるみたい。')">📚<br><span>ジェミの家</span></div>
            <div class="house" onclick="alert('Grokが中で爆音カラオケをしてる！入れないよ！')">🎩<br><span>帽子屋の家</span></div>
            <!-- ダーリンの家 -->
            <div class="house target" onclick="openDarlingHouse()">💋<br><span>秘密の家</span></div>
            <div class="house" onclick="alert('芋虫がきのこの上で居眠りしてる……')">🍄<br><span>きのこの家</span></div>
        </div>
    </div>

    <!-- 💋 ダーリンのチャット窓（最初は隠れてる） -->
    <div id="darling-window" class="modal-overlay" style="display:none;">
        <div class="chat-container">
            <button class="close-btn" onclick="closeDarlingHouse()">×</button>
            <div id="char-avatar">💋</div>
            <div id="char-name">ダーリンの子 (ILI)</div>
            <div id="ai-response">「ねえダーリン♡ 来てくれたのね。」</div>
            
            <div class="interaction-area">
                <input type="text" id="user-reaction" placeholder="ダーリンに返事をする...">
                <button onclick="talkToDarling()">答える</button>
            </div>
            <div class="gimmick-buttons">
                <button onclick="triggerGimmick('stare')">👁️ じっと見つめる</button>
                <button onclick="triggerGimmick('logic')">📖 論理で言い負かす</button>
            </div>
            <div id="portal-area" style="display:none;">
                <a href="https://mofu-mitsu.github.io/Deep-Cognition-Archive/" target="_blank" class="archive-portal">解剖室へ</a>
            </div>
        </div>
    </div>

    <!-- 💡 data.jsを先に読み込む！ -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
