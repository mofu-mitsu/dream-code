<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>夢コード - The Rabbit Hole Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="name-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: #ff85a1;">☪* 夢のパスポート ☪*</h2>
        <input type="text" id="name-input" placeholder="お名前（例：みつき）">
        <input type="text" id="type-input" placeholder="自認タイプ（例：INTJ, LII）">
        <button onclick="startFall()">ウサギの穴へ落ちる🐇</button>
    </div>
</div>

<div id="rabbit-hole-screen">
    <div class="falling-spiral">🐇💨<br><span style="font-size:20px; color:white;">「遅刻だ、遅刻だ！論理的に急がないと！」</span></div>
</div>

<div id="world-map" style="display: none;">
    <div class="wonder-object obj-library" onclick="alert('ジェミの書庫だ。')">📚<span>ジェミの書庫</span></div>
    <div class="wonder-object obj-tea" onclick="alert('狂ったお茶会だ。')">☕<span>狂ったお茶会</span></div>
    <div class="wonder-object obj-darling" onclick="openDarlingHouse()">💋<span>秘密の扉</span></div>
    <div class="wonder-object obj-mushroom" onclick="alert('芋虫が煙を吐いている…')">🍄<span>巨大なキノコ</span></div>
</div>

<!-- 💋 ダーリンチャット窓 -->
<div id="darling-window" class="modal-overlay" style="display:none;">
    <div class="chat-container">
        <button class="close-btn" onclick="closeDarlingHouse()" style="position:absolute; top:10px; right:15px; background:none; border:none; color:white; font-size:24px;">×</button>
        <div id="char-avatar">💋</div>
        <div id="char-name">ダーリンの子 (ILI)</div>
        <div id="ai-response"></div>
        
        <!-- トランプ表示エリア -->
        <div id="card-display"></div>
        
        <input type="text" id="user-reaction" placeholder="ダーリンに言葉や魔法を投げる...">
        <button onclick="DarlingEngine.sendChat()">送信</button>

        <div class="gimmick-buttons">
            <button onclick="DarlingEngine.stare()">👁️ 見つめる</button>
            <button onclick="DarlingEngine.askQuestion()">💋 問い詰められる</button>
            <button onclick="DarlingEngine.playHighLow()">🃏 ハイ＆ロー</button>
            <button onclick="DarlingEngine.startBabanuki()">🃏 ババ抜き</button>
        </div>
    </div>
</div>

<!-- 見つめる用のトースト通知 -->
<div id="toast"></div>

<!-- 読み込み順が超大事！ -->
<script src="data.js"></script>
<script src="darling.js"></script>
<script src="script.js"></script>
</body>
</html>
