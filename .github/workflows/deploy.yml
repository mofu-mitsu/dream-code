name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 権限の設定（GitHub Pagesにアップロードするために必須！）
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔥 sedの代わりに、config.js を動的生成する！
      - name: Create config.js with API Key
        run: |
          echo "const CONFIG_GROQ_API_KEY = '${{ secrets.GROQ_API_KEY }}';" > config.js

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
