name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages にアップロードするための権限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 🔥 v3 から v4 にアップグレード！

      # 🔥 config.js を自動生成する
      - name: Inject API Key into config.js
        run: |
          echo "const CONFIG_GROQ_API_KEY = '${{ secrets.GROQ_API_KEY }}';" > config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5 # 🔥 v3 から v5 にアップグレード！

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # 🔥 v1 から v3 にアップグレード（これでエラーが消える！）
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 🔥 v1 から v4 にアップグレード！
